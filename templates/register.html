{% extends "base.html" %}
{% block title %}Sign up — ScreamStream{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-logo">SCREAM<span>STREAM</span></h1>
    <h2>Create your account</h2>
    <form method="post" action="{{ url_for('register') }}">
      <input type="hidden" name="_csrf" value="{{ csrf_token }}">
      <label>
        Username
        <input type="text" name="username" autocomplete="username" required autofocus
               value="{{ username|default('') }}"
               minlength="3" maxlength="32"
               pattern="(?=.*[A-Za-z])[A-Za-z0-9_.-]{3,32}"
               title="3–32 characters and must include a letter. Allowed: letters, numbers and . _ -">
        <small class="hint">3–32 characters · must include a letter · only letters,
          numbers and . _ -</small>
      </label>
      <label>
        Password
        <input type="password" name="password" autocomplete="new-password" required
               minlength="8" maxlength="128">
        <small class="hint">At least 8 characters.</small>
        <span class="pw-meter" id="pw-meter">
          <span class="pw-track"><span class="pw-bar" id="pw-bar"></span></span>
          <small class="pw-note" id="pw-label"></small>
        </span>
      </label>
      <label>
        Confirm password
        <input type="password" name="confirm" autocomplete="new-password" required
               minlength="8" maxlength="128">
      </label>
      <button class="btn btn-primary" type="submit">Sign up</button>
    </form>
    <p class="auth-switch">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </p>
  </div>
</div>
<script src="{{ url_for('static', filename='pwcheck.js') }}" defer></script>
{% endblock %}
